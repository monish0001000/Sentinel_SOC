<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sentinel Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU2VudGluZWwgQWdlbnQiLCJzaG9ydF9uYW1lIjoiU2VudGluZWwiLCJzdGFydF91cmwiOiIvIiwidGhlbWVfY29xvciI6IiMwMDAwMDAiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzAwMDAwMCIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiaWNvbnMiOltdfQ==">
    <style>
        body { background-color: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center overflow-hidden relative">
    
    <!-- Background FX -->
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/20 via-black to-black z-0"></div>

    <div class="z-10 w-full max-w-sm p-6 flex flex-col gap-8">
        
        <!-- Header -->
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center border border-indigo-500/50 mb-4 shadow-[0_0_30px_rgba(99,102,241,0.3)]">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">SENTINEL<br><span class="text-indigo-500">MOBILE NODE</span></h1>
            <p class="text-gray-500 text-xs font-mono tracking-widest mt-2">EDR ENDPOINT</p>
        </div>

        <!-- Status Card -->
        <div id="statusCard" class="glass rounded-2xl p-6 transition-all duration-500 border-white/10">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span id="statusText" class="font-bold text-sm tracking-wide text-gray-400">DISCONNECTED</span>
                </div>
            </div>
            <div id="stats" class="space-y-4 opacity-30 blur-sm transition-all duration-500">
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-xs text-gray-500">CPU</span><span class="font-mono text-indigo-300" id="cpuVal">0%</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-xs text-gray-500">RAM</span><span class="font-mono text-indigo-300" id="ramVal">0%</span></div>
                <div class="text-center text-xs text-emerald-500 font-mono pt-2">UPLINK ACTIVE</div>
            </div>
        </div>

        <!-- Button -->
        <button id="toggleBtn" class="w-full py-4 rounded-xl font-bold tracking-widest shadow-lg bg-indigo-600 hover:bg-indigo-500 text-white transition-all active:scale-95">
            INITIALIZE AGENT
        </button>

        <p class="text-center text-[10px] text-gray-600 font-mono">ID: <span id="deviceId">...</span></p>
    </div>

    <script>
        const deviceId = localStorage.getItem('sentinel_id') || 'mobile-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('sentinel_id', deviceId);
        document.getElementById('deviceId').innerText = deviceId;

        let connected = false;
        let interval = null;

        const btn = document.getElementById('toggleBtn');
        const statusCard = document.getElementById('statusCard');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const statsDiv = document.getElementById('stats');

        // relative path works through tunnel!
        const API_BASE = window.location.origin; 

        btn.onclick = () => {
            connected = !connected;
            updateUI();
            if (connected) startAgent();
            else stopAgent();
        };

        function updateUI() {
            if (connected) {
                btn.innerText = "TERMINATE UPLINK";
                btn.className = "w-full py-4 rounded-xl font-bold tracking-widest shadow-lg bg-red-500/20 text-red-500 border border-red-500/50 transition-all active:scale-95";
                statusCard.className = "glass rounded-2xl p-6 transition-all duration-500 bg-indigo-900/20 border-indigo-500/50 shadow-[0_0_30px_rgba(99,102,241,0.2)]";
                statusDot.className = "w-3 h-3 rounded-full bg-emerald-500 pulse";
                statusText.innerText = "ONLINE";
                statusText.className = "font-bold text-sm tracking-wide text-white";
                statsDiv.className = "space-y-4 opacity-100 blur-0 transition-all duration-500";
            } else {
                btn.innerText = "INITIALIZE AGENT";
                btn.className = "w-full py-4 rounded-xl font-bold tracking-widest shadow-lg bg-indigo-600 hover:bg-indigo-500 text-white transition-all active:scale-95";
                statusCard.className = "glass rounded-2xl p-6 transition-all duration-500 border-white/10";
                statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                statusText.innerText = "DISCONNECTED";
                statusText.className = "font-bold text-sm tracking-wide text-gray-400";
                statsDiv.className = "space-y-4 opacity-30 blur-sm transition-all duration-500";
            }
        }

        async function startAgent() {
            // Register
            const payload = {
                id: deviceId,
                hostname: "Mobile Web Node",
                os: navigator.platform,
                ip: "Tunnel IP", 
                status: "online"
            };
            try {
                await fetch(API_BASE + '/api/agent/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } catch(e) { console.error(e); }

            interval = setInterval(async () => {
                // Heartbeat
                const cpu = Math.floor(Math.random() * 30 + 10);
                const ram = Math.floor(Math.random() * 20 + 40);
                
                document.getElementById('cpuVal').innerText = cpu + "%";
                document.getElementById('ramVal').innerText = ram + "%";

                const heartbeat = {
                    id: deviceId,
                    stats: { cpu, memory: ram, disk: 50, boot_time: 0, processes: 5 },
                    timestamp: Date.now() / 1000
                };
                
                try {
                    await fetch(API_BASE + '/api/agent/heartbeat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(heartbeat)
                    });
                } catch(e) {}
            }, 3000);
        }

        function stopAgent() {
            clearInterval(interval);
        }
    </script>
</body>
</html>
