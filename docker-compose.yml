services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - sentinel_net

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=admin
      - POSTGRES_DB=sentinel_logs
    networks:
      - sentinel_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  c2_core:
    build: .
    command: python main.py
    cap_add:
      - NET_ADMIN
    volumes:
      - ./c2_core:/app
    ports:
      - "8000:8000" # API
      - "8765:8765" # WebSocket C2
    environment:
      - REDIS_HOST=redis
      - ROLE=c2
    depends_on:
      - redis
      - timescaledb
    networks:
      - sentinel_net

  siem_vault:
    build: .
    command: python verify_siem_integrity.py
    volumes:
      - ./siem_vault:/app
    environment:
      - REDIS_HOST=redis
      - ROLE=siem
    depends_on:
      - redis
    networks:
      - sentinel_net

  soar_engine:
    build: .
    command: python verify_adaptive_soar.py
    volumes:
      - ./soar_engine:/app
    environment:
      - REDIS_HOST=redis
      - ROLE=soar
    depends_on:
      - redis
    networks:
      - sentinel_net

  ai_brain:
    build: .
    command: python verify_prediction.py
    volumes:
      - ./ai_brain:/app
    environment:
      - REDIS_HOST=redis
      - ROLE=ai
    depends_on:
      - redis
    networks:
      - sentinel_net
  
  db_archiver:
    build: .
    command: python db_archiver/main.py
    volumes:
      - ./db_archiver:/app/db_archiver
      # We map the root so modules like models.py (if inside db_archiver) are found roughly.
      # Wait, previous plan had db_archiver as a folder.
      # Let's ensure the build context is correct. If build: . refers to root, then mapping should be ./db_archiver:/app/db_archiver likely.
      # However, looking at main.py, it imports `models`.
      # I will stick to mapping the folder.
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=timescaledb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sentinel_logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - sentinel_net

networks:
  sentinel_net:
    driver: bridge

volumes:
  postgres_data:
